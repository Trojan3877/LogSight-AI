version: "3.9"

services:
  api:
    build: .
    container_name: logsight_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  streamlit:
    build: .
    container_name: logsight_streamlit
    command: streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - api
    env_file:
      - .env
    restart: unless-stopped