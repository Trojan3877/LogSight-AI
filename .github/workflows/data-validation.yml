name: Ingestion Schema Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 12 * * *'

jobs:
  schema-check:
    name: Verify Log Data Contracts
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # FIXED STEP: Explicitly adds pytest alongside validation tools
      - name: 📦 Install Data Integrity Frameworks
        run: |
          python -m pip install --upgrade pip
          pip install pydantic great_expectations pytest

      - name: 🧬 Audit Ingestion Model Integrity
        run: |
          python -m pytest tests/test_schema_contracts.py
