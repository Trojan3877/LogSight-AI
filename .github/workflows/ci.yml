name: Code Quality Assurance

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  style-compliance:
    name: Code Hygiene Enforcement
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Provision Linting Binaries
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      # CRITICAL FIX: Points to workspace root while excluding metadata and dependency directories
      - name: 🚀 Verify PEP 8 Alignment (120 Characters Max)
        run: flake8 . --max-line-length=120 --ignore=W293,F401 --exclude=venv,.git,__pycache__,build,dist
