name: Continuous Integration & Telemetry

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  engine-test:
    name: Core Engine Analysis Matrix
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Telemetry Core Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov

      - name: 🧪 Execute Log Parsing Analytics Suite
        run: |
          # Runs test matrix with tracking to identify untested tracking components
          pytest --cov=src --cov-report=term-missing tests/
