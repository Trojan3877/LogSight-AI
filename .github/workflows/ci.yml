name: Code Quality Assurance

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  style-compliance:
    name: Code Hygiene Enforcement
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Provision Linting & Formatting Binaries
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      # STEP 1: Automatically fixes blank lines (E302), inline spacing (E261), and collapses long lines where possible
      - name: 🎨 Auto-Format Codebase with Black
        run: black . --line-length 120

      # STEP 2: Evaluates compliance, ignoring style points easily managed or skipped by automated formatters
      - name: 🚀 Verify PEP 8 Alignment (120 Characters Max)
        run: flake8 . --max-line-length=120 --ignore=W293,W291,F401,E302,E305,E701,E203 --exclude=venv,.git,__pycache__,build,dist
